<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline — CR Cafe & Resto</title>
    <style>
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: 'Inter', system-ui, sans-serif; background: #f5f5f4; color: #1c1917; }
        .card { text-align: center; padding: 2.5rem; max-width: 420px; }
        img { width: 84px; height: auto; margin-bottom: 1.25rem; }
        h1 { font-size: 1.25rem; margin: 0 0 .5rem; }
        p { color: #57534e; margin: 0 0 1.5rem; }
        button { background: #065f46; color: #fff; border: 0; padding: .65rem 1.4rem; border-radius: 9999px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <img src="/assets/logo-cr-mark.png" alt="CR Cafe & Resto">
        <h1>Anda sedang offline</h1>
        <p>Koneksi internet terputus. Periksa jaringan Anda lalu coba lagi.</p>
        <button onclick="location.reload()">Coba Lagi</button>
    </div>
</body>
</html>
